name: Dispatch cask update

on:
  workflow_call:
    inputs:
      cask:
        required: true
        type: string
      version:
        required: true
        type: string
      sha256:
        required: true
        type: string
      desc:
        required: true
        type: string
      app:
        required: true
        type: string
      asset:
        required: true
        type: string
      name:
        required: false
        type: string
        default: ""
      minimum_macos:
        required: false
        type: string
        default: sonoma
      source_repo:
        required: false
        type: string
        default: ""
    secrets:
      NOVRD_BOT_CLIENT_ID:
        required: true
      NOVRD_BOT_KEY:
        required: true

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.NOVRD_BOT_CLIENT_ID }}
          private-key: ${{ secrets.NOVRD_BOT_KEY }}
          owner: novr
          repositories: homebrew-taps

      - name: Dispatch homebrew cask update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CASK: ${{ inputs.cask }}
          VERSION: ${{ inputs.version }}
          SHA256: ${{ inputs.sha256 }}
          DESC: ${{ inputs.desc }}
          APP: ${{ inputs.app }}
          ASSET: ${{ inputs.asset }}
          NAME: ${{ inputs.name }}
          MINIMUM_MACOS: ${{ inputs.minimum_macos }}
          SOURCE_REPO: ${{ inputs.source_repo != '' && inputs.source_repo || github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          HOMEPAGE="https://github.com/${SOURCE_REPO}"
          gh api repos/novr/homebrew-taps/dispatches \
            --method POST \
            --input - <<EOF
          {
            "event_type": "update-cask",
            "client_payload": {
              "cask": "${CASK}",
              "version": "${VERSION}",
              "sha256": "${SHA256}",
              "desc": "${DESC}",
              "homepage": "${HOMEPAGE}",
              "source_repo": "${SOURCE_REPO}",
              "app": "${APP}",
              "asset": "${ASSET}",
              "name": "${NAME}",
              "minimum_macos": "${MINIMUM_MACOS}"
            }
          }
          EOF
