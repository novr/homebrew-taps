name: Dispatch formula update

on:
  workflow_call:
    inputs:
      formula:
        required: true
        type: string
      version:
        required: true
        type: string
      url:
        required: true
        type: string
      sha256:
        required: true
        type: string
      desc:
        required: true
        type: string
      binary:
        required: true
        type: string
      test_match:
        required: true
        type: string
      license:
        required: false
        type: string
        default: MIT
      source_repo:
        required: false
        type: string
        default: ""
    secrets:
      NOVRD_BOT_CLIENT_ID:
        required: true
      NOVRD_BOT_KEY:
        required: true

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.NOVRD_BOT_CLIENT_ID }}
          private-key: ${{ secrets.NOVRD_BOT_KEY }}
          owner: novr
          repositories: homebrew-taps

      - name: Dispatch homebrew formula update
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          FORMULA: ${{ inputs.formula }}
          VERSION: ${{ inputs.version }}
          URL: ${{ inputs.url }}
          SHA256: ${{ inputs.sha256 }}
          DESC: ${{ inputs.desc }}
          BINARY: ${{ inputs.binary }}
          TEST_MATCH: ${{ inputs.test_match }}
          LICENSE: ${{ inputs.license }}
          SOURCE_REPO: ${{ inputs.source_repo != '' && inputs.source_repo || github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          HOMEPAGE="https://github.com/${SOURCE_REPO}"
          gh api repos/novr/homebrew-taps/dispatches \
            --method POST \
            --input - <<EOF
          {
            "event_type": "update-formula",
            "client_payload": {
              "formula": "${FORMULA}",
              "version": "${VERSION}",
              "url": "${URL}",
              "sha256": "${SHA256}",
              "desc": "${DESC}",
              "homepage": "${HOMEPAGE}",
              "source_repo": "${SOURCE_REPO}",
              "binary": "${BINARY}",
              "test_match": "${TEST_MATCH}",
              "license": "${LICENSE}"
            }
          }
          EOF
