name: update formula by dispatch

on:
  repository_dispatch:
    types:
      - update-formula

permissions:
  contents: write

jobs:
  update-formula:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate payload
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          URL: ${{ github.event.client_payload.url }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          set -euo pipefail
          test -n "${FORMULA}" || (echo "client_payload.formula is required" && exit 1)
          test -n "${VERSION}" || (echo "client_payload.version is required" && exit 1)
          test -n "${URL}" || (echo "client_payload.url is required" && exit 1)
          test -n "${SHA256}" || (echo "client_payload.sha256 is required" && exit 1)

      - name: Update formula file
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
          URL: ${{ github.event.client_payload.url }}
          SHA256: ${{ github.event.client_payload.sha256 }}
        run: |
          set -euo pipefail
          FORMULA_PATH="Formula/${FORMULA}.rb"
          test -f "${FORMULA_PATH}" || (echo "Formula not found: ${FORMULA_PATH}" && exit 1)

          # shellcheck disable=SC2016
          ruby -i -pe '
            formula_version = ENV.fetch("VERSION")
            formula_url = ENV.fetch("URL")
            formula_sha256 = ENV.fetch("SHA256")
            $_ = $_.sub(/^\s*version\s+".*"$/, "  version \"#{formula_version}\"")
            $_ = $_.sub(/^\s*url\s+".*"$/, "      url \"#{formula_url}\"")
            $_ = $_.sub(/^\s*sha256\s+".*"$/, "      sha256 \"#{formula_sha256}\"")
          ' "${FORMULA_PATH}"

      - name: Commit and push
        env:
          FORMULA: ${{ github.event.client_payload.formula }}
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo "No changes detected. Skipping commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${FORMULA}.rb"
          git commit -m "Update ${FORMULA} formula to ${VERSION}"
          git push
